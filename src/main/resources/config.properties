# =========================================================================
# SUDOKU GRID CONFIGURATION
# =========================================================================
# These values determine the size of the inner partitions (subgrids).
# The total size of the board is automatically calculated as (rows * cols).
# 
# Common configurations:
# - Standard 9x9:  rows=3, cols=3
# - Mini 6x6:      rows=2, cols=3
# - Mini 4x4:      rows=2, cols=2
# - Giant 16x16:   rows=4, cols=4
#
# Note: You can also override these at runtime via JVM system properties:
# mvn compile exec:java -Dsubgrid.rows=2 -Dsubgrid.cols=3
# =========================================================================
subgrid.rows=3
subgrid.cols=3
